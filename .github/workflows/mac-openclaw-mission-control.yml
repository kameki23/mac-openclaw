name: mac-openclaw-mission-control

on:
  push:
    paths:
      - '**'
      - '.github/workflows/mac-openclaw-mission-control.yml'
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  validate-and-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML exists
        run: |
          test -f index.html

      - name: Validate required sidebar/checklist labels
        run: |
          grep -q '毎日の確認チェックリスト' index.html
          grep -q 'GitHub連携状況' index.html
          grep -q 'ミッション可視化' index.html

      - name: Upload mission-control artifact
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-pixel
          path: |
            index.html
            assets/
            status.json
            scripts/
